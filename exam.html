<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Examination System - Exam</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <style>
    html,
    body {
      height: 100%;
      overflow: hidden;
    }

    #options-container .col-6 {
      height: 72px;
    }

    .option-btn {
      height: 100%;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .sidebar-card {
      width: 46px;
      height: 46px;
      border-radius: 10px;
      border: 2px solid transparent;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform .1s, box-shadow .1s;
      user-select: none;
    }

    .sidebar-card:hover {
      transform: translateY(-1px);
      box-shadow: 0 3px 8px rgba(0, 0, 0, .12);
    }
  </style>
</head>

<body class="bg-light">


  <div id="results-screen" style="display:none;">
    <div class="min-vh-100 d-flex align-items-center justify-content-center p-4">
      <div class="card border-0 shadow text-center p-5" style="max-width:460px; width:100%;">

        <div id="result-icon" class="fs-1 mb-3"></div>
        <h2 id="result-heading" class="fw-bold mb-1"></h2>
        <p id="result-name" class="text-muted small text-uppercase mb-4"></p>

        <div class="rounded-circle border border-3 d-flex align-items-center justify-content-center mx-auto mb-4"
          style="width:120px; height:120px;">
          <span id="result-score" class="fw-bold fs-2"></span>
        </div>

        <p id="result-detail" class="text-muted mb-4"></p>

        <div class="d-flex flex-column gap-2 mx-auto" style="max-width:280px;">
          <button id="restart-btn" class="btn btn-dark">
            <i class="fa-solid fa-rotate-left"></i> Try Again
          </button> <button onclick="logout()" class="btn btn-outline-secondary">Sign Out</button>
        </div>

      </div>
    </div>
  </div>


  <div id="exam-screen" class="d-flex flex-column" style="height:100vh;">

    <nav class="navbar navbar-light bg-white border-bottom px-3 px-md-4 flex-shrink-0 flex-wrap py-0"
      style="min-height:54px;">

      <div class="d-flex align-items-center w-100 gap-2" style="height:54px;">
        <span class="navbar-brand fw-bold mb-0 flex-shrink-0">Examination System</span>

        <div id="progress-track d-lg-none"
          class="d-none d-lg-flex align-items-center gap-1 flex-grow-1 justify-content-center px-2 overflow-hidden">
        </div>


        <div class="d-flex align-items-center gap-2 flex-shrink-0">
          <span id="user-greeting" class="text-muted small d-none d-md-inline "></span>
          <span id="timer" class="badge bg-secondary font-monospace fs-6 d-none d-md-inline">02:00</span>
        </div>
      </div>

      <div class="d-flex d-lg-none w-100 justify-content-center align-items-center bg-light border-top py-2 px-3">
        <div id="progress-track-mobile"
          class="d-flex align-items-center gap-1 justify-content-center w-100 overflow-hidden">
        </div>
      </div>

      <div class="d-flex d-md-none w-100 justify-content-center align-items-center bg-light border-top py-2">
        <span id="timer-mobile" class="badge bg-secondary font-monospace fs-6 w-100 text-center py-2">02:00</span>
      </div>

    </nav>

    <div class="d-flex flex-row flex-grow-1 overflow-hidden">

      <main
        class="flex-grow-1 d-flex flex-column justify-content-center align-items-center overflow-hidden p-4 text-center">

        <p id="question-number" class="text-success text-uppercase small fw-semibold mb-3">
          Question 1 of 10
        </p>

        <h3 id="question-text" class="fw-semibold mb-4 w-100" style="max-width:680px; min-height:60px;">
          Loading…
        </h3>

        <div id="options-container" class="row g-3 w-100" style="max-width:680px;"></div>

      </main>

      <aside class="d-none d-lg-flex flex-column flex-shrink-0 border-start bg-white p-3 overflow-y-auto"
        style="width:210px;">

        <p class="text-uppercase fw-bold text-muted mb-3" style="font-size:11px; letter-spacing:0.08em;">Questions</p>

        <div id="sidebar-grid" class="d-flex flex-wrap gap-2"></div>

        <div class="mt-3 pt-3 border-top d-flex flex-column gap-2">
          <div class="d-flex align-items-center gap-2" style="font-size:11px; color:#6c757d;">
            <div class="rounded-2 flex-shrink-0" style="width:12px; height:12px; background:#212529;"></div>
            <span>Current</span>
          </div>
          <div class="d-flex align-items-center gap-2" style="font-size:11px; color:#6c757d;">
            <div class="rounded-2 flex-shrink-0" style="width:12px; height:12px; background:#198754;"></div>
            <span>Answered</span>
          </div>
          <div class="d-flex align-items-center gap-2" style="font-size:11px; color:#6c757d;">
            <div class="rounded-2 flex-shrink-0" style="width:12px; height:12px; background:#ffc107;"></div>
            <span>Marked</span>
          </div>
          <div class="d-flex align-items-center gap-2" style="font-size:11px; color:#6c757d;">
            <div class="rounded-2 flex-shrink-0" style="width:12px; height:12px; background:#dee2e6;"></div>
            <span>Unanswered</span>
          </div>
        </div>

      </aside>

    </div>

    <div class="bg-white border-top d-flex align-items-center justify-content-center gap-2 shadow-sm flex-shrink-0"
      style="height:64px;">
      <button id="prev-btn" class="btn btn-outline-secondary btn-sm px-3">
        <i class="fa-solid fa-arrow-left"></i> Prev
      </button>

      <button id="mark-btn" class="btn btn-outline-warning btn-sm">
        <i class="fa-solid fa-flag"></i> Mark
      </button>

      <button id="submit-btn" class="btn btn-dark btn-sm px-4" disabled>
        <i class="fa-solid fa-paper-plane"></i> Submit
      </button>

      <button id="next-btn" class="btn btn-outline-secondary btn-sm px-3">
        Next <i class="fa-solid fa-arrow-right"></i>
      </button>
    </div>

  </div>

  <div class="modal fade" id="submit-modal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content p-4">

        <h5 class="fw-bold mb-2">Ready to submit?</h5>
        <p class="text-muted small mb-3">
          Your answers will be locked in and scored immediately. This cannot be undone.
        </p>

        <div id="modal-marked-msg" class="alert alert-warning small py-2 mb-4"></div>

        <button id="modal-confirm-btn" class="btn btn-dark w-100 mb-2">Submit exam</button>
        <button id="modal-cancel-btn" class="btn btn-outline-secondary w-100" data-bs-dismiss="modal">
          Go back &amp; review
        </button>

      </div>
    </div>
  </div>


  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/storage.js"></script>
  <script src="/js/validator.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/questions.js"></script>
  <script src="/js/exam-state.js"></script>
  <script src="/js/exam-timer.js"></script>
  <script src="/js/exam-ui.js"></script>
  <script src="/js/exam-actions.js"></script>
  <script src="/js/exam-init.js"></script>

</body>

</html>

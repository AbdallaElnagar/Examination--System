<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Examination System — Sign Up</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
</head>

<body>

  <div class="container-fluid p-0 min-vh-100 d-flex">
    <div class="row g-0 w-100">

      <div class="col-md-5 d-none d-md-flex flex-column justify-content-between bg-dark text-white p-5">
        <div class="fw-bold fs-5">Examination System</div>

        <div>
          <h1 class="display-5 fw-light mb-3">
            Join &amp;<br /><em class="text-white-50">begin.</em>
          </h1>
          <p class="text-white-50">
            Create your account and take the exam. No fluff, just knowledge.
          </p>
        </div>

        <small class="text-white-50">Online Exam Platform · 2025</small>
      </div>

      <div class="col-12 col-md-7 d-flex align-items-center justify-content-center bg-light p-4 p-md-5">
        <div class="w-100" style="max-width:440px;">

          <h2 class="fw-bold mb-1">Create account</h2>
          <p class="text-muted mb-4">Fill in the details below to get started.</p>

          <div id="form-error" class="alert alert-danger" style="display:none;"></div>

          <div class="row g-3 mb-3">
            <div class="col-6">
              <label for="fname" class="form-label fw-semibold">First Name</label>
              <input id="fname" type="text" class="form-control" placeholder="John" />
              <div id="fname-err" class="invalid-feedback"></div>
            </div>
            <div class="col-6">
              <label for="lname" class="form-label fw-semibold">Last Name</label>
              <input id="lname" type="text" class="form-control" placeholder="Smith" />
              <div id="lname-err" class="invalid-feedback"></div>
            </div>
          </div>

          <div class="mb-3">
            <label for="email" class="form-label fw-semibold">Email</label>
            <input id="email" type="email" class="form-control" placeholder="you@example.com" />
            <div id="email-err" class="invalid-feedback"></div>
          </div>

          <div class="mb-3">
            <label for="password" class="form-label fw-semibold">Password</label>
            <input id="password" type="password" class="form-control" placeholder="At least 6 characters" />
            <div id="password-err" class="invalid-feedback"></div>
          </div>

          <div class="mb-4">
            <label for="repassword" class="form-label fw-semibold">Confirm Password</label>
            <input id="repassword" type="password" class="form-control" placeholder="Repeat password" />
            <div id="repassword-err" class="invalid-feedback"></div>
          </div>

          <button id="register-btn" class="btn btn-dark w-100 mb-3">Create Account</button>

          <p class="text-center text-muted small">
            Have an account? <a href="login.html" class="fw-semibold text-dark">Sign in</a>
          </p>

        </div>
      </div>

    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/storage.js"></script>
  <script src="/js/validator.js"></script>
  <script src="/js/auth.js"></script>
  <script>
    const alreadyLoggedInUser = loadCurrentUser();
    if (alreadyLoggedInUser) {
      window.location.href = "exam.html";
    }

    document.getElementById("register-btn").addEventListener("click", function () {
      handleRegister();
    });

    const allInputFields = document.querySelectorAll(".form-control");
    for (let i = 0; i < allInputFields.length; i++) {
      allInputFields[i].addEventListener("keydown", function (keyboardEvent) {
        if (keyboardEvent.key === "Enter") {
          handleRegister();
        }
      });
    }
  </script>

</body>

</html>

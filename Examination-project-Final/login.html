<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Examination System — Sign In</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
</head>

<body>

  <div class="container-fluid p-0 min-vh-100 d-flex">
    <div class="row g-0 w-100">

      <div class="col-md-5 d-none d-md-flex flex-column justify-content-between bg-dark text-white p-5">
        <div class="fw-bold fs-5">Examination System</div>

        <div>
          <h1 class="display-5 fw-light mb-3">
            Welcome<br /><em class="text-white-50">back.</em>
          </h1>
          <p class="text-white-50">
            Sign in to pick up where you left off and continue your exam journey.
          </p>
        </div>

        <small class="text-white-50">Online Exam Platform · 2025</small>
      </div>

      <div class="col-12 col-md-7 d-flex align-items-center justify-content-center bg-light p-4 p-md-5">
        <div class="w-100" style="max-width:400px;">

          <h2 class="fw-bold mb-1">Sign in</h2>
          <p class="text-muted mb-4">Enter your email and password to continue.</p>

          <div id="success-banner" class="alert alert-success d-none">
            Account created — please sign in.
          </div>
          <div id="form-error" class="alert alert-danger" style="display:none;"></div>

          <div class="mb-3">
            <label for="email" class="form-label fw-semibold">Email</label>
            <input id="email" type="email" class="form-control" placeholder="you@example.com" />
            <div id="email-err" class="invalid-feedback"></div>
          </div>

          <div class="mb-4">
            <label for="password" class="form-label fw-semibold">Password</label>
            <input id="password" type="password" class="form-control" placeholder="Your password" />
            <div id="password-err" class="invalid-feedback"></div>
          </div>

          <button id="login-btn" class="btn btn-dark w-100 mb-3">Sign In</button>

          <p class="text-center text-muted small">
            No account? <a href="register.html" class="fw-semibold text-dark">Sign up free</a>
          </p>

        </div>
      </div>

    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/storage.js"></script>
  <script src="/js/validator.js"></script>
  <script src="/js/auth.js"></script>
  <script>
    const alreadyLoggedInUser = loadCurrentUser();
    if (alreadyLoggedInUser) {
      window.location.href = "exam.html";
    }

    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.get("registered") === "1") {
      document.getElementById("success-banner").classList.remove("d-none");
    }

    document.getElementById("login-btn").addEventListener("click", function () {
      handleLogin();
    });

    const allInputFields = document.querySelectorAll(".form-control");
    for (let i = 0; i < allInputFields.length; i++) {
      allInputFields[i].addEventListener("keydown", function (keyboardEvent) {
        if (keyboardEvent.key === "Enter") {
          handleLogin();
        }
      });
    }
  </script>

</body>

</html>
